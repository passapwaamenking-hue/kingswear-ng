<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KingsWear NG | Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:black;
}

.logo{
font-size:28px;
font-weight:bold;
color:gold;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
}

.container{
padding:60px 8%;
}

.title{
text-align:center;
font-size:40px;
margin-bottom:40px;
color:gold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.info{
padding:20px;
}

.price{
color:gold;
font-size:20px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
background:gold;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:gold;
color:black;
padding:10px 18px;
border-radius:30px;
font-weight:bold;
}

footer{
text-align:center;
padding:30px;
margin-top:50px;
background:black;
}
</style>
</head>

<body>

<div class="cart">
🛒 Cart: <span id="cart-count">0</span>
</div>

<nav>
<div class="logo">KingsWear NG</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<div class="container">

<h1 class="title">Shop Collection</h1>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" alt="">
<div class="info">
<h3>Premium Tee</h3>
<p class="price">₦15,000</p>
<button onclick="addCart()">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723" alt="">
<div class="info">
<h3>Luxury Hoodie</h3>
<p class="price">₦25,000</p>
<button onclick="addCart()">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506629905607-0e1c8a53c8e1" alt="">
<div class="info">
<h3>Street Joggers</h3>
<p class="price">₦18,000</p>
<button onclick="addCart()">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="">
<div class="info">
<h3>Designer Jacket</h3>
<p class="price">₦35,000</p>
<button onclick="addCart()">Add To Cart</button>
</div>
</div>

</div>

</div>

<footer>
© 2026 KingsWear NG
</footer>

<script>
let cart = 0;

function addCart(){
cart++;
document.getElementById("cart-count").innerText = cart;
alert("Added to cart");
}
</script>

</body>
</html>
